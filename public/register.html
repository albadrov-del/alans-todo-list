<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Alan's To Do List</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-page">

    <header class="auth-header">
      <div class="auth-header-inner">
        <h1 class="auth-logo">Alan's To Do list</h1>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">

        <h2 class="auth-title">Create account</h2>
        <p class="auth-subtitle">Fill in your details to get started.</p>

        <div class="auth-error"   id="auth-error"   aria-live="polite"></div>
        <div class="auth-success" id="auth-success" aria-live="polite"></div>

        <form class="auth-form" id="register-form" novalidate>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
              placeholder="alansmith"
              autocomplete="username" required />
            <span class="field-error" id="username-error"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
              placeholder="you@example.com"
              autocomplete="email" required />
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
              placeholder="At least 8 characters"
              autocomplete="new-password" required />
            <span class="field-error" id="password-error"></span>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" name="confirm-password"
              placeholder="••••••••"
              autocomplete="new-password" required />
            <span class="field-error" id="confirm-error"></span>
          </div>

          <button type="submit" class="btn-auth-submit" id="submit-btn">
            Create account
          </button>

        </form>

        <p class="auth-switch">
          Already have an account? <a href="/login">Sign in</a>
        </p>

      </div>
    </main>

  </div>

  <script src="auth.js"></script>
</body>
</html>
