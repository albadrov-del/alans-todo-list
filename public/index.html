<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alan's To Do List</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">

    <header class="header">
      <div class="header-inner">
        <h1 class="header-title">Alan's To Do list</h1>
        <div class="header-meta">
          <span class="user-greeting">Hi, <strong id="user-display"></strong></span>
          <button class="btn-sign-out" id="btn-sign-out">Sign out</button>
        </div>
      </div>
    </header>

    <main class="main">

      <div class="accordion" id="accordion">
        <!-- Panels are rendered dynamically by app.js -->
      </div>

      <div class="add-new-wrap">
        <button class="btn-add-new" id="btn-add-new" aria-label="Add new list">
          <svg class="add-icon" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <line x1="12" y1="8"  x2="12" y2="16"></line>
            <line x1="8"  y1="12" x2="16" y2="12"></line>
          </svg>
          Add new list
        </button>
      </div>

    </main>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
